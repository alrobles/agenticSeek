[MAIN]
is_local = True
provider_name = ollama
provider_model = deepseek-r1:14b
provider_server_address = 127.0.0.1:11434
# To route through a local AgenticPlug gateway instead, set:
#   provider_name = agenticplug
#   provider_model = hermes
#   provider_server_address = 127.0.0.1:8080
# and configure AGENTICPLUG_* variables in .env (see .env.example).
#
# To use DeepSeek with your own API key (BYOK mode), set:
#   provider_name = deepseek_byok
#   provider_model = deepseek-chat
# and store your key securely: ecoseek keys set deepseek
# See docs/deepseek-byok.md for full setup instructions.
agent_name = Jarvis
recover_last_session = False
save_session = False
speak = False
listen = False
jarvis_personality = False
languages = en
[BROWSER]
headless_browser = True
stealth_mode = False
